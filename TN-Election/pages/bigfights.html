<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Fights | TN Election 2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/bigfights.css" />
  </head>

  <body data-page="bigfights">
    <div id="navbar-container"></div>

    <main>
      <section class="bigfights-page">
 
        <!-- Filter Tabs -->
        <div class="bigfight-tabs">
          <button class="bigfight-tab bigfight-tab--active" data-filter="all">
            Big Fights
          </button>
          <button class="bigfight-tab" data-filter="popular">
            Popular Battles
          </button>
        </div>
 
        <!-- Cards Grid — JS injects cards here -->
        <div class="bigfight-grid" id="bigfight-cards-container"></div>
 
      </section>
    </main>

    <!-- Step 1: Data -->
    <script src="../data/navbar.js"></script>
    <script src="../data/bigfights.js"></script>
    <script src="../data/head_to_head.js"></script>

    <!-- Step 2: Shared components -->
    <script src="../js/components/navbar.js"></script>

    <!-- Step 3: Page modules -->
    <script src="../js/bigfights/bigfight-cards.js"></script>
    <script src="../js/bigfights/popular-battles.js"></script>
  </body>
</html>
